<script>
const sb = window.supabase.createClient(
  "https://cbgwfngseoppybsbbwwo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNiZ3dmbmdzZW9wcHlic2Jid3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk4NTk4NDYsImV4cCI6MjA3NTQzNTg0Nn0.5U_4SNDZ18YA7PHY7dH3vZItGp-_XzeQxS1IMAuBQEs",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      storage: window.localStorage,
      storageKey: "gelatoclub_kiosk_auth_v1"
    }
  }
);

let syncChannel = null;
function getSyncChannel(){
  try{
    if(syncChannel) return syncChannel;
    syncChannel = sb.channel("gelato-sync");
    syncChannel.subscribe();
    return syncChannel;
  }catch(e){
    console.warn("sync channel init error", e);
    return null;
  }
}
async function sendRedemptionUpdate(id, status){
  const ch = getSyncChannel();
  if(!ch) return;
  try{
    await ch.send({ type:"broadcast", event:"redemption:update", payload:{ id, status } });
  }catch(e){
    console.warn("broadcast redemption:update failed", e);
  }
}

let promotions = [];
let totalCount = 0;
let focusMode = false;
let activeTab = (localStorage.getItem("kiosk_tab") || "promo");
if(!["promo","rewards","users"].includes(activeTab)) activeTab = "promo";
let pendingPromoIds = new Set();
let pendingRewardIds = new Set();
let online = true;
let lastError = "";
let promoRows = [];
let rewardRows = [];
// Keyboard navigation state
let navMode = false; // true after user presses any navigation key
let selectedKind = activeTab; // 'promo' or 'rewards'
let selectedIndex = 0;
let lastTopPromoId = null;
let lastTopRewardId = null;

function isCardSelected(kind, idx){
  return selectedKind === kind && selectedIndex === idx;
}

function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }

function getCurrentCards(){
  const kind = (activeTab === "rewards") ? "rewards" : "promo";
  const cards = kind === "promo" ? (promoRows || []) : (rewardRows || []);
  return { kind, cards };
}

function selectCard(kind, idx){
  selectedKind = kind;
  selectedIndex = idx;
  navMode = true;
  renderAll();
}

function armAutoSelect(kind){
  selectedKind = kind;
  selectedIndex = 0;
  navMode = false;
}

function handleNewTop(kind){
  // if a new request arrives while navigating, go back to auto-select mode (Enter-ready)
  armAutoSelect(kind);
}

function initKeyboardOnce(){
  if(window.__kioskKeyboardInit) return;
  window.__kioskKeyboardInit = true;

  document.addEventListener("keydown", (e)=>{
    const key = e.key;
    const code = e.code || "";

    const isNum = (k)=> key === String(k) || code === ("Numpad"+k);
    const isEnter = key === "Enter" || code === "NumpadEnter";
    const isBack = key === "Backspace" || key === "Delete" || code === "Backspace" || code === "Delete" || isNum(0);

    if(isNum(4)){
      e.preventDefault();
      selectedKind = "promo";
      selectedIndex = 0;
      navMode = true;
      setTab("promo");
      return;
    }
    if(isNum(6)){
      e.preventDefault();
      selectedKind = "rewards";
      selectedIndex = 0;
      navMode = true;
      setTab("rewards");
      return;
    }

    if(isNum(8) || key === "ArrowUp"){
      e.preventDefault();
      const { kind, cards } = getCurrentCards();
      if(!cards.length) return;
      selectedKind = kind;
      selectedIndex = clamp(selectedIndex - 1, 0, cards.length - 1);
      navMode = true;
      renderAll();
      return;
    }
    if(isNum(2) || key === "ArrowDown"){
      e.preventDefault();
      const { kind, cards } = getCurrentCards();
      if(!cards.length) return;
      selectedKind = kind;
      selectedIndex = clamp(selectedIndex + 1, 0, cards.length - 1);
      navMode = true;
      renderAll();
      return;
    }

    if(isEnter){
      e.preventDefault();
      triggerPrimaryAction();
      return;
    }

    if(isBack){
      e.preventDefault();
      triggerSecondaryAction();
      return;
    }
  });
}

function getSelectedMeta(){
  const kind = selectedKind;
  const list = kind === "promo" ? (promoRows || []) : (rewardRows || []);
  if(!list.length) return null;
  const idx = clamp(selectedIndex, 0, list.length - 1);
  const row = list[idx];
  if(!row) return null;

  if(kind === "promo"){
    const title = (getPromoTitle(row.promo_id) || row.promo_id || "");
    return { kind, id: row.id, title };
  }else{
    const title = (getRewardTitle(row.reward_id) || row.reward_id || "");
    return { kind, id: row.id, title };
  }
}

function triggerPrimaryAction(){
  const meta = getSelectedMeta();
  if(!meta) return;
  if(meta.kind === "promo"){
    approve(meta.id, String(meta.title).replace(/'/g,"\'"));
  }else{
    approveReward(meta.id, String(meta.title).replace(/'/g,"\'"));
  }
}

function triggerSecondaryAction(){
  const meta = getSelectedMeta();
  if(!meta) return;
  if(meta.kind === "promo"){
    cancel(meta.id, String(meta.title).replace(/'/g,"\'"));
  }else{
    rejectReward(meta.id, String(meta.title).replace(/'/g,"\'"));
  }
}



// Compact activity + users
let activityStats = { ready:false, days:[] };
let lastActivityFetch = 0;
let usersRows = [];
let usersSearch = localStorage.getItem("kiosk_users_search") || "";
let usersLoading = false;
let usersError = "";
let pointPendingIds = new Set();
let lastUsersFetch = 0;

function escapeHtml(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function normalizeEmail(v){ return String(v || "").trim().toLowerCase(); }

async function loadActivityStats(force=false){
  const nowMs = Date.now();
  if(!force && (nowMs - lastActivityFetch) < 30000) return;
  lastActivityFetch = nowMs;
  const sinceISO = startOfNDaysAgoLocalISO(6);
  try{
    const { data, error } = await sb.from("redemptions").select("created_at,status").in("status", ["approved", "canceled", "rejected", "expired"]).gte("created_at", sinceISO).order("created_at", { ascending:true }).limit(5000);
    if(error) throw error;
    const keys = [], map = {};
    for(let i=6;i>=0;i--){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i); const key=dateKeyLocal(d); keys.push(key); map[key]={ key, label:String(d.getDate()).padStart(2,"0"), approved:0, canceled:0 }; }
    (data||[]).forEach(r=>{ const key=dateKeyLocal(new Date(r.created_at)); if(!map[key]) return; const st=String(r.status||"").toLowerCase(); if(st==="approved") map[key].approved++; if(st==="canceled"||st==="rejected"||st==="expired") map[key].canceled++; });
    activityStats = { ready:true, days:keys.map(k=>map[k]) };
    renderAll();
  }catch(e){ console.error("loadActivityStats error", e); }
}

async function loadUsers(force=false){
  const nowMs = Date.now();
  if(!force && (nowMs - lastUsersFetch) < 30000) return;
  lastUsersFetch = nowMs;
  usersLoading = true; usersError = ""; renderAll();
  try{
    const search = normalizeEmail(usersSearch);
    let q = sb.from("clients").select("id,email,points,last_redeem").order("email", { ascending:true }).limit(300);
    if(search) q = q.ilike("email", `%${search}%`);
    const { data, error } = await q;
    if(error) throw error;
    usersRows = data || [];
  }catch(e){ console.error("loadUsers error", e); usersError = e?.message || String(e); usersRows = []; }
  finally{ usersLoading = false; renderAll(); }
}

function onUserSearch(v){ usersSearch = v || ""; localStorage.setItem("kiosk_users_search", usersSearch); clearTimeout(window.__usersSearchTimer); window.__usersSearchTimer = setTimeout(()=>loadUsers(true), 260); }

async function changeUserPoints(id, delta){
  if(!id || pointPendingIds.has(id)) return;
  const user = usersRows.find(u=>u.id===id); if(!user) return;
  const current = Number(user.points || 0); const next = Math.max(0, current + delta);
  pointPendingIds.add(id); user.points = next; renderAll();
  try{
    const { error } = await sb.from("clients").update({ points: next }).eq("id", id);
    if(error) throw error;
    showToast((delta>0 ? "✅ Punto aggiunto" : "✅ Punto rimosso") + " • " + (user.email || id), "ok");
  }catch(e){ console.error("changeUserPoints error", e); user.points = current; showToast("❌ Errore modifica punti", "bad"); }
  finally{ pointPendingIds.delete(id); renderAll(); }
}


async function loadPromotions(){
  const res = await fetch("https://cbgwfngseoppybsbbwwo.supabase.co/storage/v1/object/public/config/promotions.json", { cache: "no-store" });
  if(!res.ok){
    const txt = await res.text();
    throw new Error("Impossibile caricare promotions.json (" + res.status + "). URL: https://cbgwfngseoppybsbbwwo.supabase.co/storage/v1/object/public/config/promotions.json. Risposta: " + txt.slice(0,120));
  }
  promotions = await res.json();
}

function getPromoTitle(id){
  const p = promotions.find(x=>x.id===id);
  return p ? p.title : id;
}

function formatTime(ts){
  return new Date(ts).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
}

function todayCount(data){
  const today = new Date().toDateString();
  return data.filter(x=>new Date(x.created_at).toDateString()===today).length;
}

function showToast(message, kind="info"){
  const el = document.getElementById("toast");
  if(!el) return;
  el.textContent = message;
  el.style.borderColor = (kind==="ok") ? "rgba(34,197,94,0.55)" : (kind==="bad") ? "rgba(239,68,68,0.55)" : "rgba(148,163,184,0.35)";
  el.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ el.classList.remove("show"); }, 1800);
}
function minutesAgo(ts){
  const ms = Date.now() - new Date(ts).getTime();
  return Math.max(0, Math.floor(ms/60000));
}

function isRewardPendingStatus(s){
  if(!s) return false;
  const v = String(s).toLowerCase();
  return v === "waiting" || v === "pending" || v === "requested";
}
function formatDateTime(ts){
  if(!ts) return "";
  return new Date(ts).toLocaleString("it-IT",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit"});
}

function dateKeyLocal(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function startOfTodayLocalISO(){
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0,0,0,0);
  return start.toISOString();
}
function startOfNDaysAgoLocalISO(daysAgo){
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0,0,0,0);
  start.setDate(start.getDate() - daysAgo);
  return start.toISOString();
}


function renderLogin(){
  document.getElementById("app").innerHTML=`
  <div class="login">
    <h2>Login Staff</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="loginBtn" onclick="login()">Accedi</button>
  </div>`;
}

async function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){ alert("Login fallito"); return;}
  checkStaff();
}

async function checkStaff(){
  const {data:user}=await sb.auth.getUser();
  if(!user?.user?.email) return renderLogin();

  const {data}=await sb
    .from("staff_emails")
    .select("*")
    .eq("email",user.user.email)
    .single();

  if(!data){
    alert("Non autorizzato");
    await sb.auth.signOut();
    renderLogin();
  }else{
    startDashboard();
  }
}

async function startDashboard(){
  initKeyboardOnce();
  try{ await loadPromotions(); }catch(e){ console.error(e); alert(String(e.message||e)); return; }
  setInterval(()=>{ loadRedemptions(); loadRewards(); },2000);
  setInterval(()=>{ loadActivityStats(false); if(activeTab === "users") loadUsers(false); },30000);
  renderAll();
  loadRedemptions();
  loadRewards();
  loadActivityStats(true);
  if(activeTab === "users") loadUsers(true);
}

async function loadRedemptions(){
  try{
    const {data, error} = await sb
      .from("redemptions")
      .select("*")
      .eq("status","waiting")
      .order("created_at",{ascending:true});

    if(error) throw error;

    online = true;
    lastError = "";

    const rows = data || [];

    // Auto-expire: waiting older than 5 minutes -> mark expired
    const now = Date.now();
    const toExpire = rows.filter(r => (now - new Date(r.created_at).getTime()) > 5*60*1000).map(r => r.id);
    if(toExpire.length){
      // avoid double-submission in the same tick
      const expireIds = toExpire.filter(id => !pendingPromoIds.has(id));
      if(expireIds.length){
        expireIds.forEach(id => pendingPromoIds.add(id));
        const { error: expErr } = await sb.from("redemptions").update({status:"expired"}).in("id", expireIds);
        expireIds.forEach(id => pendingPromoIds.delete(id));
        if(expErr){
          console.error(expErr);
          lastError = expErr.message || String(expErr);
        }else{
          // notify clients so they can close pending UI
          for(const rid of ids){ await sendRedemptionUpdate(rid, "expired"); }
        }
      }
    }

    // filter out those we just expired (they'll disappear next poll anyway)
    const visible = rows.filter(r => !toExpire.includes(r.id));
    promoRows = visible;
    const topId = promoRows && promoRows[0] ? promoRows[0].id : null;
    if(topId && topId !== lastTopPromoId){
      lastTopPromoId = topId;
      handleNewTop("promo");
    }
    if(!navMode && activeTab === "promo"){ armAutoSelect("promo"); }
    renderAll();
  }catch(e){
    online = false;
    lastError = e?.message ? e.message : String(e);
    console.error(e);
    promoRows = [];
    renderAll(); // still render header/status
  }
}


async function loadRewards(){
  try{
    const { data, error } = await sb
      .from("loyalty_reward_redemptions")
      .select("*")
      .order("created_at",{ascending:true})
      .limit(200);

    if(error) throw error;

    online = true;
    lastError = "";

    const rows = (data || []).filter(r => isRewardPendingStatus(r.status));

    const now = Date.now();
    const expired = rows.filter(r => r.expire_at && (new Date(r.expire_at).getTime() < now)).map(r => r.id);
    if(expired.length){
      const ids = expired.filter(id => !pendingRewardIds.has(id));
      if(ids.length){
        ids.forEach(id => pendingRewardIds.add(id));
        const { error: expErr } = await sb.from("loyalty_reward_redemptions")
          .update({status:"rejected"})
          .in("id", ids);
        ids.forEach(id => pendingRewardIds.delete(id));
        if(expErr){
          console.error(expErr);
          lastError = expErr.message || String(expErr);
        }else{
          // notify clients so they can close pending UI
          for(const rid of ids){ await sendRedemptionUpdate(rid, "expired"); }
        }
      }
    }

    rewardRows = rows.filter(r => !expired.includes(r.id));
    const topIdR = rewardRows && rewardRows[0] ? rewardRows[0].id : null;
    if(topIdR && topIdR !== lastTopRewardId){
      lastTopRewardId = topIdR;
      handleNewTop("rewards");
    }
    if(!navMode && activeTab === "rewards"){ armAutoSelect("rewards"); }
    renderAll();
  }catch(e){
    online = false;
    lastError = e?.message ? e.message : String(e);
    console.error(e);
    rewardRows = [];
    renderAll();
  }
}

async function approveReward(id, title=""){
  if(pendingRewardIds.has(id)) return;
  pendingRewardIds.add(id);
  renderAll();
  try{
    const { error } = await sb.from("loyalty_reward_redemptions")
      .update({status:"approved", approved_at: new Date().toISOString()})
      .eq("id", id);
    if(error) throw error;
    showToast("✅ Premio approvato: " + (title || id), "ok");
  }catch(e){
    console.error(e);
    showToast("❌ Errore approvazione premio", "bad");
  }finally{
    pendingRewardIds.delete(id);
    loadRewards();
  }
}

async function rejectReward(id, title=""){
  if(pendingRewardIds.has(id)) return;
  pendingRewardIds.add(id);
  renderAll();
  try{
    const { error } = await sb.from("loyalty_reward_redemptions")
      .update({status:"rejected"})
      .eq("id", id);
    if(error) throw error;
    showToast("❌ Premio rifiutato: " + (title || id), "bad");
  }catch(e){
    console.error(e);
    showToast("❌ Errore rifiuto premio", "bad");
  }finally{
    pendingRewardIds.delete(id);
    loadRewards();
  }
}

function setTab(tab){
  activeTab = tab;
  localStorage.setItem("kiosk_tab", tab);
  if(tab === "users") loadUsers(true);
  renderAll();
}

function renderAll(){
  renderDashboard(promoRows);
}

function renderDashboard(data){
  const waitingCount = (promoRows || []).length;
  const rewardWaiting = (rewardRows || []).length;
  const kbdHint = (!navMode && ((activeTab==="promo" && waitingCount>0) || (activeTab==="rewards" && rewardWaiting>0))) ? `<div class="kbdHint"><b>INVIO</b> = CONVALIDA • <b>BACK/0</b> = ANNULLA • <b>8/2</b> su/giù • <b>4</b> Promo • <b>6</b> Premi</div>` : "";
  const statusLabel = online ? "Online" : "Offline";
  const dotClass = online ? "dot" : "dot off";
  const statusBadgeClass = online ? "badge onlinePulse" : "badge";
  const errText = (!online && lastError) ? `<div class="small">Errore: ${escapeHtml(String(lastError).slice(0,120))}</div>` : "";
  const tabs = `<div class="tabs"><div class="tab ${activeTab==="promo"?"active":""}" onclick="setTab('promo')">Promo <span class="countpill">${waitingCount}</span></div><div class="tab ${activeTab==="rewards"?"active":""}" onclick="setTab('rewards')">Premi <span class="countpill">${rewardWaiting}</span></div><div class="tab ${activeTab==="users"?"active":""}" onclick="setTab('users')">Utenti <span class="countpill">${usersRows.length||""}</span></div></div>`;

  const promoList = `<div class="container">${(promoRows||[]).map((r,i)=>{ const mins=minutesAgo(r.created_at); const age=mins===0?"adesso":(mins===1?"1 min":(mins+" min")); const disabled=pendingPromoIds.has(r.id)?"disabled":""; const title=escapeHtml(getPromoTitle(r.promo_id)||r.promo_id||""); const email=escapeHtml(r.user_email||"OSPITE"); return `<div class="card waiting ${isCardSelected("promo",i)?"selected":""}" onclick="selectCard('promo', ${i})"><div class="promo">${title}</div><div class="user">${email}</div><div class="time">${formatTime(r.created_at)} • in attesa da ${age}</div><div class="buttons"><button class="approve" ${disabled} onclick="event.stopPropagation(); approve('${r.id}','${title}')">CONVALIDA</button><button class="cancel" ${disabled} onclick="event.stopPropagation(); cancel('${r.id}','${title}')">ANNULLA</button></div></div>`; }).join("") || `<div class="emptyBox">Nessuna richiesta promo in attesa.</div>`}</div>`;

  const rewardsList = `<div class="container">${(rewardRows||[]).map((r,i)=>{ const mins=minutesAgo(r.created_at); const age=mins===0?"adesso":(mins===1?"1 min":(mins+" min")); const disabled=pendingRewardIds.has(r.id)?"disabled":""; const title=escapeHtml(r.reward_title||r.reward_id||"Premio"); const exp=r.expire_at?` • scade: ${formatTime(r.expire_at)}`:""; const who=escapeHtml(r.user_email||r.client_ref||"OSPITE"); return `<div class="card waiting ${isCardSelected("rewards",i)?"selected":""}" onclick="selectCard('rewards', ${i})"><div class="promo">${title}</div><div class="user">${who}</div><div class="time">${formatTime(r.created_at)} • in attesa da ${age}${exp}</div><div class="small">Costo: <b>${escapeHtml(r.cost_points)}</b> punti • Codice: <b>${escapeHtml(r.code||"-")}</b></div><div class="buttons"><button class="approve" ${disabled} onclick="event.stopPropagation(); approveReward('${r.id}','${title}')">CONVALIDA PREMIO</button><button class="cancel" ${disabled} onclick="event.stopPropagation(); rejectReward('${r.id}','${title}')">RIFIUTA</button></div></div>`; }).join("") || `<div class="emptyBox">Nessun premio tessera in attesa.</div>`}</div>`;

  const usersList = `<div class="container"><div class="card"><div class="promo">Utenti registrati</div><div class="usageLead">Cerca per email e modifica i punti del profilo.</div><div class="usersToolbar"><input class="searchInput" id="usersSearchInput" placeholder="Cerca email..." value="${escapeHtml(usersSearch)}" oninput="onUserSearch(this.value)"><button onclick="loadUsers(true)">Aggiorna</button></div>${usersError?`<div class="emptyBox">Errore caricamento utenti: ${escapeHtml(usersError)}</div>`:""}${usersLoading?`<div class="emptyBox">Caricamento utenti...</div>`:""}${(!usersLoading&&!usersRows.length&&!usersError)?`<div class="emptyBox">Nessun utente trovato.</div>`:""}${(usersRows||[]).map(u=>{ const pending=pointPendingIds.has(u.id)?"disabled":""; const email=escapeHtml(u.email||"senza email"); const pts=Number(u.points||0); return `<div class="userRow"><div class="userEmail">${email}</div><div class="userPoints">${pts} pt</div><div class="pointButtons"><button class="pointBtn minus" ${pending} onclick="changeUserPoints('${u.id}', -1)">−</button><button class="pointBtn plus" ${pending} onclick="changeUserPoints('${u.id}', 1)">+</button></div></div>`; }).join("")}</div></div>`;

  const activityCard = `<div class="container" id="activityCard"><div class="card chartShell"><div class="promo">Riepilogo convalide</div><div class="usageLead">Ultimi 7 giorni • richieste promo convalidate e annullate</div><div class="activityGrid">${(activityStats.ready?activityStats.days:[]).map(d=>`<div class="dayBox"><div class="day">Giorno ${escapeHtml(d.label)}</div><div class="dayStats"><span class="miniPill ok">✓ ${d.approved}</span><span class="miniPill bad">× ${d.canceled}</span></div></div>`).join("") || `<div class="emptyBox">Caricamento riepilogo...</div>`}</div></div></div>`;

  const main = activeTab==="users" ? usersList : (activeTab==="rewards" ? rewardsList : promoList);
  const title = activeTab==="users" ? "Gestione utenti" : (activeTab==="rewards" ? "Premi in attesa" : "Convalide in attesa");
  document.getElementById("app").innerHTML = `<div class="header"><div class="title" style="text-align:center;">Kiosk</div><div class="small" style="text-align:center; margin-top:2px; opacity:0.85;">Gelateria L’Altromare</div><div style="height:10px;"></div><div class="title">${title}</div><div class="toprow"><div class="${statusBadgeClass}"><span class="${dotClass}"></span>${statusLabel}</div></div>${tabs}${kbdHint}${errText}</div>${main}${activityCard}`;
}

async function approve(id, promoTitle=""){
  if(pendingPromoIds.has(id)) return;
  pendingPromoIds.add(id);
  renderAll(); // refresh UI to disable buttons immediately
  try{
    const { error } = await sb.from("redemptions")
      .update({status:"approved"})
      .eq("id",id);

    if(error) throw error;

    await sendRedemptionUpdate(id, "approved");
    showToast("✅ Convalidata: " + (promoTitle || id), "ok");
  }catch(e){
    console.error(e);
    showToast("❌ Errore convalida", "bad");
  }finally{
    pendingPromoIds.delete(id);
    renderAll();
  }
}

async function cancel(id, promoTitle=""){
  if(pendingPromoIds.has(id)) return;
  pendingPromoIds.add(id);
  renderAll();
  try{
    const { error } = await sb.from("redemptions")
      .update({status:"canceled"})
      .eq("id",id);

    if(error) throw error;

    await sendRedemptionUpdate(id, "canceled");
    showToast("❌ Annullata: " + (promoTitle || id), "bad");
  }catch(e){
    console.error(e);
    showToast("❌ Errore annulla", "bad");
  }finally{
    pendingPromoIds.delete(id);
    renderAll();
  }
}

sb.auth.getSession().then(({data, error})=>{
  if(error){
    try{ localStorage.removeItem("gelatoclub_kiosk_auth_v1"); }catch(e){}
    sb.auth.signOut();
    renderLogin();
    return;
  }
  if(data.session){
    checkStaff();
  }else{
    renderLogin();
  }
});
