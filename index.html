<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Gelato Club Kiosk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  margin:0;
  font-family:Inter,system-ui;
  background:#0f172a;
  color:white;
}
.header{
  padding:20px;
  background:#111827;
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid #1f2937;
}
.title{
  font-size:28px;
  font-weight:700;
}
.stats{
  margin-top:8px;
  font-size:16px;
  opacity:0.8;
}
.container{
  padding:20px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  border:2px solid transparent;
  transition:0.3s;
}

.card.selected{
  outline:2px solid rgba(96,165,250,0.95);
  box-shadow:0 0 0 4px rgba(96,165,250,0.15);
}
.card.selected .buttons .approve{
  filter:brightness(1.05);
}
.kbdHint{
  margin-top:10px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(59,130,246,0.12);
  border:1px solid rgba(59,130,246,0.25);
  font-size:13px;
  color:rgba(226,232,240,0.95);
}
.waiting{
  animation:blink 1.2s infinite;
}
@keyframes blink{
  0%{border-color:#22c55e;}
  50%{border-color:#3b82f6;}
  100%{border-color:#22c55e;}
}
.promo{
  font-size:22px;
  font-weight:600;
}
.user{
  margin-top:8px;
  font-size:16px;
  opacity:0.8;
}
.time{
  margin-top:4px;
  font-size:14px;
  opacity:0.6;
}
.buttons{
  margin-top:15px;
  display:flex;
  gap:10px;
}
.buttons button{
  flex:1;
}
button{
  padding:14px;
  font-size:16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
}
.approve{
  background:#22c55e;
  color:black;
}
.cancel{
  background:#ef4444;
  color:white;
}
.login{
  display:flex;
  flex-direction:column;
  height:100vh;
  justify-content:center;
  align-items:center;
  gap:10px;
}
input{
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
  width:250px;
}
.loginBtn{
  width:250px;
  padding:12px;
  border-radius:10px;
  font-size:16px;
  font-weight:700;
  background:#e5e7eb;
  color:#0f172a;
}

.toast{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  background:rgba(17,24,39,0.92);
  border:1px solid rgba(148,163,184,0.35);
  padding:12px 16px;
  border-radius:14px;
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
  font-size:16px;
  font-weight:700;
  max-width:90vw;
  display:none;
  z-index:9999;
}
.toast.show{ display:block; animation:toastIn 220ms ease-out; }
@keyframes toastIn{ from{opacity:0; transform:translateX(-50%) translateY(8px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border-radius:999px;
  font-size:14px;
  font-weight:700;
  border:1px solid rgba(148,163,184,0.25);
  background:rgba(15,23,42,0.6);
}
.dot{ width:10px; height:10px; border-radius:999px; background:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,0.15); }
.dot.off{ background:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,0.15); }
.badge.onlinePulse{ animation:onlinePulse 2.6s ease-in-out infinite; }
@keyframes onlinePulse{ 0%,100%{opacity:1;} 50%{opacity:0.55;} }

.toprow{
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
button:disabled{
  opacity:0.55;
  cursor:not-allowed;
  filter:saturate(0.8);
}
.small{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
}


.tabs{
  display:flex;
  gap:10px;
  margin-top:12px;
}
.tab{
  flex:1;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,0.25);
  background:rgba(15,23,42,0.55);
  font-weight:800;
  text-align:center;
  cursor:pointer;
  user-select:none;
}
.tab.active{
  background:rgba(59,130,246,0.65);
  border-color:rgba(59,130,246,0.55);
}
.countpill{
  margin-left:8px;
  padding:2px 8px;
  border-radius:999px;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(148,163,184,0.25);
  font-size:12px;
  font-weight:900;
}

/* Usage chart */
.chartWrap{
  margin-top:12px;
  background:rgba(15,23,42,0.45);
  border:1px solid rgba(148,163,184,0.18);
  border-radius:14px;
  padding:12px;
}
.chartMeta{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}
.chartMeta .badge{ background:rgba(15,23,42,0.45); }


/* --- Mobile layout tweaks --- */
@media (max-width: 520px){
  .header{ padding:14px; }
  .container{ padding:12px; }
  .title{ font-size:22px; }
  .stats{ font-size:14px; }
  .usageHeader{ gap:8px; }
  .updatePill{ margin-left:0; }
  .usageMeta{ grid-template-columns: repeat(2, minmax(0, 1fr)); gap:8px; }
  .usageMeta .badge{ padding:10px; font-size:12px; }
  .chartGrid{ grid-template-columns: 1fr; gap:10px; }
  .chartWrap{ padding:10px; min-height:150px; }
  .chartTitle{ font-size:14px; }
}

/* Small-height screens (old phones): keep charts compact */
@media (max-width: 520px) and (max-height: 800px){
  .chartWrap{ min-height:135px; }
}


.chartWrap h3{ margin:0 0 8px 0; font-size:16px; }.chartMetaProfessional{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}
.statBadge{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  border-radius:14px;
  background:linear-gradient(180deg, rgba(30,41,59,0.88), rgba(15,23,42,0.9));
  border:1px solid rgba(96,165,250,0.18);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.statBadge span{
  font-size:13px;
  color:rgba(226,232,240,0.78);
  font-weight:700;
}
.statBadge b{
  font-size:22px;
  color:#fff;
}
@media (max-width: 900px){
  .chartMetaProfessional{ grid-template-columns:1fr; }
  .statBadge b{ font-size:20px; }
}

  --bg:#081227;
  --bg-2:#0d1a33;
  --panel:#16233f;
  --panel-2:#1b2a49;
  --line:rgba(148,163,184,0.16);
  --line-strong:rgba(96,165,250,0.24);
  --text-soft:rgba(226,232,240,0.78);

}
body{
  background:
    radial-gradient(1200px 420px at 50% -10%, rgba(59,130,246,0.18), transparent 60%),
    linear-gradient(180deg, #081227 0%, #0a1530 100%);
  min-height:100vh;
}
.header{
  background:linear-gradient(180deg, rgba(6,14,30,0.92), rgba(9,19,41,0.88));
  backdrop-filter: blur(10px);
}
.titleBlock{
  text-align:center;
  margin-bottom:14px;
}
.brandTitle{
  font-size:40px;
  line-height:1;
  font-weight:800;
  letter-spacing:-0.03em;
}
.brandSub{
  margin-top:6px;
  color:var(--text-soft);
  font-size:15px;
  font-weight:600;
}
.sectionTitle{
  font-size:22px;
  font-weight:800;
  letter-spacing:-0.02em;
}

  background:linear-gradient(180deg, rgba(24,37,64,0.96), rgba(16,28,52,0.97));

}
.tabs{gap:12px;}
.tab{
  background:rgba(11,22,43,0.68);
  border-color:rgba(148,163,184,0.18);
}
.tab.active{
  background:linear-gradient(180deg, rgba(59,130,246,0.85), rgba(37,99,235,0.78));
  border-color:rgba(96,165,250,0.36);
  box-shadow:0 10px 24px rgba(37,99,235,0.2);
}
.chartShell{
  position:relative;
  overflow:hidden;
}
.chartShell::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:radial-gradient(700px 140px at 20% -20%, rgba(96,165,250,0.10), transparent 55%);
}
.usageLead{
  margin-top:4px;
  margin-bottom:14px;
  color:var(--text-soft);
  font-size:14px;
  font-weight:600;
}
.chartMetaProfessional{
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
  margin-top:14px;
}
.statBadge{
  min-height:82px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(17,27,49,0.96), rgba(12,22,42,0.96));
  border:1px solid var(--line-strong);
  padding:16px 18px;
}
.statBadge span{
  display:block;
  font-size:13px;
  color:var(--text-soft);
  font-weight:700;
  margin-bottom:8px;
}
.statBadge b{
  display:block;
  font-size:32px;
  letter-spacing:-0.03em;
}
.statHint{
  font-size:12px;
  color:rgba(191,219,254,0.72);
  font-weight:700;
}
.chartWrap{
  margin-top:16px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(17,28,52,0.82), rgba(14,24,44,0.88));
  border:1px solid rgba(148,163,184,0.14);
}
.small{color:var(--text-soft);}
@media (max-width: 900px){
  .chartMetaProfessional{ grid-template-columns:1fr; }
}

/* === 2026 Kiosk polish: dark premium + readable activity summary === */
:root{
  --k-bg:#071126;
  --k-panel:#13213d;
  --k-panel-2:#182a4c;
  --k-line:rgba(148,163,184,.20);
  --k-blue:#3b82f6;
  --k-green:#22c55e;
  --k-red:#ef4444;
  --k-text-soft:rgba(226,232,240,.74);
}
body{
  background:
    radial-gradient(900px 420px at 50% -10%, rgba(59,130,246,.20), transparent 60%),
    linear-gradient(180deg,#061024 0%,#091631 100%);
}
.header{
  background:linear-gradient(180deg,rgba(6,14,30,.96),rgba(8,18,39,.92));
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(148,163,184,.16);
  box-shadow:0 10px 30px rgba(0,0,0,.22);
}
.card{
  background:linear-gradient(180deg,rgba(25,39,69,.98),rgba(14,26,50,.98));
  border:1px solid rgba(148,163,184,.16);
  box-shadow:0 22px 50px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.035);
}
.tab{
  min-height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:18px;
  border-radius:20px;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.tab:active{ transform:scale(.985); }
.tab.active{
  background:linear-gradient(180deg,rgba(59,130,246,.96),rgba(37,99,235,.86));
  border-color:rgba(147,197,253,.42);
  box-shadow:0 14px 32px rgba(37,99,235,.28), inset 0 1px 0 rgba(255,255,255,.10);
}
.countpill{
  min-width:24px;
  text-align:center;
  padding:3px 9px;
  background:rgba(5,10,20,.52);
}
.emptyBox{
  border-radius:24px;
  padding:30px 22px;
  border:1px dashed rgba(148,163,184,.26);
  background:rgba(9,19,41,.52);
  color:rgba(226,232,240,.72);
  text-align:center;
  font-size:18px;
}
.refreshBtn{
  background:linear-gradient(180deg,#f8fafc,#e2e8f0);
  color:#0f172a;
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 10px 22px rgba(0,0,0,.20);
}
.refreshBtn:disabled{ opacity:.65; }
.searchInput{
  min-height:52px;
  border-radius:16px;
  background:rgba(8,18,39,.68);
  border:1px solid rgba(148,163,184,.22);
}
.userRow{
  border-radius:24px;
  padding:18px;
  background:linear-gradient(180deg,rgba(13,25,49,.86),rgba(10,22,43,.86));
  border:1px solid rgba(148,163,184,.14);
}
.userPoints{ background:rgba(96,165,250,.16); border-color:rgba(96,165,250,.30); }
.pointBtn{ border-radius:18px; box-shadow:0 12px 22px rgba(0,0,0,.20); }

.activityGridPro{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
  margin-top:16px;
}
.activityDayCard{
  position:relative;
  overflow:hidden;
  border-radius:24px;
  padding:18px;
  background:linear-gradient(180deg,rgba(11,24,48,.92),rgba(8,19,40,.94));
  border:1px solid rgba(96,165,250,.18);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
}
.activityDayCard::before{
  content:"";
  position:absolute;
  inset:-1px;
  background:radial-gradient(340px 110px at 0% 0%,rgba(34,197,94,.08),transparent 58%);
  pointer-events:none;
}
.activityTop{
  position:relative;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}
.activityDate{
  font-size:26px;
  line-height:1;
  font-weight:950;
  letter-spacing:-.03em;
}
.activityLabel{
  margin-top:6px;
  font-size:13px;
  color:var(--k-text-soft);
  font-weight:750;
}
.activityTotal{
  padding:7px 11px;
  border-radius:999px;
  background:rgba(96,165,250,.13);
  border:1px solid rgba(96,165,250,.25);
  color:#dbeafe;
  font-weight:950;
  white-space:nowrap;
}
.activityCounts{
  position:relative;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.activityCountBox{
  border-radius:18px;
  padding:13px 12px;
  border:1px solid rgba(148,163,184,.14);
  background:rgba(15,23,42,.50);
}
.activityCountBox b{
  display:block;
  font-size:28px;
  line-height:1;
  letter-spacing:-.04em;
}
.activityCountBox span{
  display:block;
  margin-top:5px;
  font-size:12px;
  color:var(--k-text-soft);
  font-weight:850;
}
.activityCountBox.ok b{ color:#86efac; }
.activityCountBox.bad b{ color:#fca5a5; }
.activityBar{
  position:relative;
  margin-top:14px;
  height:12px;
  border-radius:999px;
  background:rgba(239,68,68,.25);
  overflow:hidden;
  border:1px solid rgba(148,163,184,.10);
}
.activityBarFill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#16a34a,#86efac);
  min-width:0%;
  transition:width .3s ease;
}
.activityEmptyNote{
  margin-top:12px;
  color:rgba(226,232,240,.56);
  font-size:13px;
  font-weight:750;
}
@media(max-width:760px){
  .tabs{gap:10px;}
  .tab{min-height:78px; flex-direction:column; font-size:20px;}
  .activityGridPro{ grid-template-columns:1fr; }
  .activityDayCard{ padding:20px; }
  .activityDate{ font-size:28px; }
  .activityCountBox b{ font-size:30px; }
  .usersToolbar{ align-items:stretch; }
  .searchInput{ width:100%; min-width:0; flex-basis:100%; }
  .refreshBtn{ width:max-content; }
}


/* Admin manager */
.adminGrid{
  display:grid;
  grid-template-columns:minmax(0, 0.92fr) minmax(0, 1.08fr);
  gap:20px;
  align-items:start;
}
.adminPanel{
  background:linear-gradient(180deg, rgba(24,37,64,0.96), rgba(16,28,52,0.98));
  border:1px solid rgba(148,163,184,.18);
  border-radius:22px;
  padding:18px;
  box-shadow:0 18px 42px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.035);
}
.adminPanelTitle{
  font-size:22px;
  font-weight:900;
  letter-spacing:-.03em;
  margin-bottom:6px;
}
.adminHint{
  color:rgba(226,232,240,.68);
  font-size:13px;
  font-weight:650;
  line-height:1.45;
  margin-bottom:14px;
}
.formGrid{
  display:grid;
  gap:12px;
}
.formRow2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.fieldLabel{
  display:block;
  margin-bottom:6px;
  color:rgba(226,232,240,.72);
  font-size:12px;
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.adminInput,.adminTextarea,.adminSelect{
  width:100%;
  box-sizing:border-box;
  border:1px solid rgba(148,163,184,.18);
  background:rgba(15,23,42,.78);
  color:#fff;
  border-radius:14px;
  padding:13px 12px;
  font-size:15px;
  outline:none;
}
.adminTextarea{
  min-height:92px;
  resize:vertical;
  line-height:1.45;
}
.adminInput:focus,.adminTextarea:focus,.adminSelect:focus{
  border-color:rgba(96,165,250,.75);
  box-shadow:0 0 0 4px rgba(96,165,250,.14);
}
.adminBtn{
  border:none;
  border-radius:14px;
  padding:13px 15px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  background:#fbbf24;
  color:#111827;
  box-shadow:0 12px 26px rgba(251,191,36,.16);
}
.adminBtn.secondary{
  background:rgba(255,255,255,.08);
  color:#fff;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:none;
}
.adminBtn.danger{
  background:rgba(239,68,68,.15);
  color:#fecaca;
  border:1px solid rgba(239,68,68,.28);
  box-shadow:none;
}
.adminBtn:disabled{
  opacity:.55;
  cursor:not-allowed;
}
.adminList{
  display:grid;
  gap:12px;
}
.adminItem{
  display:grid;
  grid-template-columns:70px minmax(0,1fr) auto;
  gap:14px;
  align-items:center;
  border:1px solid rgba(148,163,184,.15);
  border-radius:20px;
  background:rgba(15,23,42,.54);
  padding:12px;
}
.adminThumb{
  width:70px;
  height:70px;

async function sendRedemptionUpdate(id, status){
  const ch = getSyncChannel();
  if(!ch) return;

  let client_ref = "";
  try{

let promotions = [];

if(!["promo","rewards","users","managePromos","manageRewards","manageNews"].includes(activeTab)) activeTab = "promo";
let pendingPromoIds = new Set();

let online = true;

let managerBusy = false;
let managedFlavors = [];
let flavorBusy = false;
let iconFiles = [];
let iconPickerTarget = null;

// Keyboard navigation state
let navMode = false; // true after user presses any navigation key
let selectedKind = activeTab; // 'promo' or 'rewards'
let selectedIndex = 0;
let lastTopPromoId = null;
let lastTopRewardId = null;

function isCardSelected(kind, idx){
  return selectedKind === kind && selectedIndex === idx;
}

function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }

function getCurrentCards(){
  if(activeTab !== "promo" && activeTab !== "rewards") return { kind: activeTab, cards: [] };
  const kind = (activeTab === "rewards") ? "rewards" : "promo";
  const cards = kind === "promo" ? (promoRows || []) : (rewardRows || []);
  return { kind, cards };

function selectCard(kind, idx){
  selectedKind = kind;
  selectedIndex = idx;
  navMode = true;
  renderAll();

function armAutoSelect(kind){
  selectedKind = kind;
  selectedIndex = 0;
  navMode = false;
}

function handleNewTop(kind){
  // if a new request arrives while navigating, go back to auto-select mode (Enter-ready)
  armAutoSelect(kind);
}

function initKeyboardOnce(){
  if(window.__kioskKeyboardInit) return;
  window.__kioskKeyboardInit = true;

  document.addEventListener("keydown", (e)=>{
    const tag = String(e.target?.tagName || "").toLowerCase();
    if(tag === "input" || tag === "textarea" || e.target?.isContentEditable){
      return;
    }

    const key = e.key;
    const code = e.code || "";

    const isNum = (k)=> key === String(k) || code === ("Numpad"+k);
    const isEnter = key === "Enter" || code === "NumpadEnter";
    const isBack = key === "Backspace" || key === "Delete" || code === "Backspace" || code === "Delete" || isNum(0);

    if(isNum(4)){
      e.preventDefault();
      selectedKind = "promo";
      selectedIndex = 0;
      navMode = true;
      setTab("promo");
      return;
    }
    if(isNum(6)){
      e.preventDefault();
      selectedKind = "rewards";
      selectedIndex = 0;
      navMode = true;
      setTab("rewards");
      return;
    }

    if(isNum(8) || key === "ArrowUp"){
      e.preventDefault();
      const { kind, cards } = getCurrentCards();
      if(!cards.length) return;
      selectedKind = kind;
      selectedIndex = clamp(selectedIndex - 1, 0, cards.length - 1);
      navMode = true;
      renderAll();
      return;
    }
    if(isNum(2) || key === "ArrowDown"){
      e.preventDefault();
      const { kind, cards } = getCurrentCards();
      if(!cards.length) return;
      selectedKind = kind;
      selectedIndex = clamp(selectedIndex + 1, 0, cards.length - 1);
      navMode = true;
      renderAll();
      return;
    }

    if(isEnter){
      e.preventDefault();
      triggerPrimaryAction();
      return;
    }

    if(isBack){
      e.preventDefault();
      triggerSecondaryAction();
      return;
    }
  });
}

function getSelectedMeta(){
  const kind = selectedKind;
  const list = kind === "promo" ? (promoRows || []) : (rewardRows || []);
  if(!list.length) return null;
  const idx = clamp(selectedIndex, 0, list.length - 1);
  const row = list[idx];
  if(!row) return null;

  if(kind === "promo"){
    const title = (getPromoTitle(row.promo_id) || row.promo_id || "");
    return { kind, id: row.id, title };
  }else{
    const title = (getRewardTitle(row.reward_id) || row.reward_id || "");
    return { kind, id: row.id, title };
  }
}

function triggerPrimaryAction(){

}

function triggerSecondaryAction(){
  const meta = getSelectedMeta();

    cancel(meta.id, String(meta.title).replace(/'/g,"\'"));
  }else{
    rejectReward(meta.id, String(meta.title).replace(/'/g,"\'"));
  }
}



// Compact activity + users
let activityStats = { ready:false, days:[] };
let lastActivityFetch = 0;
let usersRows = [];
let usersSearch = localStorage.getItem("kiosk_users_search") || "";
let usersLoading = false;
let usersError = "";
let pointPendingIds = new Set();
let lastUsersFetch = 0;

function escapeHtml(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function normalizeEmail(v){ return String(v || "").trim().toLowerCase(); }
function isUsersSearchFocused(){
  return activeTab === "users" && document.activeElement && document.activeElement.id === "usersSearchInput";
}
function isManagementTab(){
  return activeTab === "managePromos" || activeTab === "manageRewards" || activeTab === "manageNews";
}
function isFormControlFocused(){
  const el = document.activeElement;
  if(!el) return false;

  const tag = String(el.tagName || "").toLowerCase();
  return tag === "input" || tag === "textarea" || tag === "select" || !!el.isContentEditable;
}
function safeRenderAll(){
  // Non ricostruire il DOM mentre scrivi:
  // su mobile ogni render chiude la tastiera e svuota i campi.
  // Le tab di gestione si aggiornano solo quando entri, salvi o premi azioni esplicite.
  if(isUsersSearchFocused()) return;
  if(isManagementTab()) return;
  if(isFormControlFocused()) return;

  renderAll();
}

async function loadActivityStats(force=false){
  const nowMs = Date.now();
  if(!force && (nowMs - lastActivityFetch) < 30000) return;
  lastActivityFetch = nowMs;
  const sinceISO = startOfNDaysAgoLocalISO(6);
  try{
    const { data, error } = await sb.from("redemptions").select("created_at,status").in("status", ["approved", "canceled", "rejected", "expired"]).gte("created_at", sinceISO).order("created_at", { ascending:true }).limit(5000);
    if(error) throw error;
    const keys = [], map = {};
    // Ordine decrescente: oggi in alto, poi ieri, ecc. Non cambia i dati, solo l'ordine visuale.
    for(let i=0;i<=6;i++){
      const d=new Date();
      d.setHours(0,0,0,0);
      d.setDate(d.getDate()-i);
      const key=dateKeyLocal(d);
      keys.push(key);
      map[key]={ key, label:d.toLocaleDateString("it-IT", { day:"2-digit", month:"2-digit" }), approved:0, canceled:0 };
    }
    (data||[]).forEach(r=>{ const key=dateKeyLocal(new Date(r.created_at)); if(!map[key]) return; const st=String(r.status||"").toLowerCase(); if(st==="approved") map[key].approved++; if(st==="canceled"||st==="rejected"||st==="expired") map[key].canceled++; });
    activityStats = { ready:true, days:keys.map(k=>map[k]) };
    safeRenderAll();
  }catch(e){ console.error("loadActivityStats error", e); }
}

async function loadUsers(force=false){
  // La pagina Utenti NON deve aggiornarsi da sola: su mobile ogni render chiude la tastiera.
  // Questa funzione viene chiamata solo quando apri la tab Utenti o premi Aggiorna.
  if(!force) return;

  usersLoading = true;
  usersError = "";
  if(activeTab === "users") renderDashboard(promoRows); else renderAll();

  try{
    const { data, error } = await sb
      .from("clients")
      .select("id,email,points,last_redeem")
      .order("email", { ascending:true })
      .limit(5000);

    if(error) throw error;

    // Deduplica per email: se ci sono doppioni tiene la riga con più punti.
    const byEmail = new Map();
    (data || []).forEach(row => {
      const email = normalizeEmail(row.email || "");
      if(!email) return;
      const clean = {
        id: row.id,
        email: email,
        points: Number(row.points || 0),
        last_redeem: row.last_redeem || null
      };
      const prev = byEmail.get(email);
      if(!prev || Number(clean.points || 0) > Number(prev.points || 0)){
        byEmail.set(email, clean);
      }
    });
    usersRows = Array.from(byEmail.values()).sort((a,b)=>String(a.email).localeCompare(String(b.email)));
  }catch(e){
    console.error("loadUsers error", e);
    usersError = e?.message || String(e);
    usersRows = [];
  }finally{
    usersLoading = false;
    if(activeTab === "users") renderDashboard(promoRows);
    else if(!isManagementTab()) renderAll();

    setTimeout(filterUserRowsInDom, 0);
  }
}

function onUserSearch(v){
  usersSearch = v || "";
  try{ localStorage.setItem("kiosk_users_search", usersSearch); }catch{}
  filterUserRowsInDom();
}

function filterUserRowsInDom(){
  const input = document.getElementById("usersSearchInput");
  if(input && input.value !== usersSearch) input.value = usersSearch;
  const q = normalizeEmail(usersSearch);
  document.querySelectorAll(".userRow[data-email]").forEach(row=>{
    const email = normalizeEmail(row.getAttribute("data-email") || "");
    row.style.display = (!q || email.includes(q)) ? "grid" : "none";
  });
}

async function changeUserPoints(id, delta){
  if(!id || pointPendingIds.has(id)) return;

  const idx = usersRows.findIndex(u => String(u.id) === String(id));
  if(idx < 0){ showToast("❌ Utente non trovato", "bad"); return; }

  const user = usersRows[idx];
  const email = normalizeEmail(user.email || "");
  if(!email){ showToast("❌ Email utente mancante", "bad"); return; }

  const current = Number(user.points || 0);

  pointPendingIds.add(id);
  updateUserRowPendingInDom(id, true);

  try{
    // Aggiornamento server-side sicuro.
    // La funzione Supabase public.adjust_client_points(email, delta) aggiorna public.clients.points
    // e restituisce il nuovo valore reale salvato nel DB.
    const { data, error } = await sb.rpc("adjust_client_points", {
      p_email: email,
      p_delta: Number(delta || 0)
    });

    if(error) throw error;

    const newPoints = Math.max(0, Number(data ?? current));
    usersRows[idx] = { ...user, points: newPoints };
    updateUserRowPointsInDom(id, newPoints, false);
    showToast((delta > 0 ? "✅ +1 punto" : "✅ -1 punto") + " • " + email, "ok");
  }catch(e){
    console.error("changeUserPoints rpc error", e);
    updateUserRowPointsInDom(id, current, false);
    showToast("❌ Errore punti: " + String(e?.message || e).slice(0,140), "bad");
  }finally{
    pointPendingIds.delete(id);
    updateUserRowPendingInDom(id, false);
  }
}

function cssEscapeSimple(v){ return String(v).replace(/\\/g,"\\\\").replace(/"/g,'\\"'); }
function updateUserRowPointsInDom(id, points, pending){
  const row = document.querySelector(`.userRow[data-id="${cssEscapeSimple(id)}"]`);
  if(!row) return;
  const p = row.querySelector(".userPoints");
  if(p) p.textContent = `${Number(points || 0)} pt`;
  updateUserRowPendingInDom(id, pending);
}
function updateUserRowPendingInDom(id, pending){
  const row = document.querySelector(`.userRow[data-id="${cssEscapeSimple(id)}"]`);
  if(!row) return;
  row.querySelectorAll("button").forEach(btn => { btn.disabled = !!pending; });

function readVal(id){
  return String(document.getElementById(id)?.value ?? "").trim();
}
function readNum(id, fallback=0){
  const n = Number(readVal(id));
  return Number.isFinite(n) ? n : fallback;
}
function normalizeDateInput(v){
  const s = String(v || "").trim();
  return s || undefined;
}
function dateInputToMs(v){
  const s = String(v || "").trim();
  if(!s) return undefined;
  const t = new Date(s + "T00:00:00").getTime();
  return Number.isFinite(t) ? t : undefined;
}
function normalizeNullableDate(v){

  return s || null;
}
function getRewardCostValue(r){

function encodeStoragePath(path){
  return String(path || "")
    .split("/")
    .map(part => encodeURIComponent(part))
    .join("/");
}
function publicIconUrl(name){
  const encoded = encodeStoragePath(name);
  return `https://cbgwfngseoppybsbbwwo.supabase.co/storage/v1/object/public/icons/${encoded}`;

async function loadIconFiles(){
  if(iconPickerLoading) return;
  iconPickerLoading = true;

  try{
    const { data, error } = await sb.storage
      .from("icons")
      .list("", {
        limit: 300,
        offset: 0,
        sortBy: { column: "name", order: "asc" }
      });

    if(error) throw error;

    iconFiles = (data || [])
      .filter(f => {
        const name = String(f.name || "");
        return /\.(png|jpg|jpeg|webp|gif|svg)$/i.test(name);
      })
      .map(f => {
        const name = String(f.name || "");
        return { name, url: publicIconUrl(name) };
      });
  }catch(e){
    console.error("loadIconFiles", e);
    showToast("❌ Errore caricamento bucket icons", "bad");
    iconFiles = [];
  }finally{
    iconPickerLoading = false;
  }
}

function closeIconPicker(){

function chooseIconIndex(index){

  if(!item?.url){

    return;
  }

function chooseIconUrl(url){
  const cleanUrl = String(url || "").trim();

  if(!iconPickerTarget || !cleanUrl){
    showToast("❌ Nessun campo immagine selezionato", "bad");
    return;
  }

  const input = document.getElementById(iconPickerTarget);
  if(input){
    input.value = cleanUrl;
    input.setAttribute("value", cleanUrl);
    input.dispatchEvent(new Event("input", { bubbles:true }));
    input.dispatchEvent(new Event("change", { bubbles:true }));

    box.innerHTML = cleanUrl
      ? `<img src="${escapeHtml(cleanUrl)}" crossorigin="anonymous" alt="">`
      : `<span>🍨</span>`;

    box.innerHTML = cleanUrl
      ? `<img src="${escapeHtml(cleanUrl)}" crossorigin="anonymous" alt="">`

function normalizeFlavorDay(raw, fallback){
  const isClosed = !!(raw?.isClosed ?? raw?.is_closed ?? fallback.isClosed);
  const tags = Array.isArray(raw?.tags)
    ? raw.tags
    : String(raw?.tags || "")
      .split(",")
      .map(t => t.trim())
      .filter(Boolean);

  return {
    id: String(raw?.id || fallback.id),
    dayKey: Number(raw?.dayKey ?? raw?.day_key ?? fallback.dayKey),
    shortLabel: String(raw?.shortLabel ?? raw?.short_label ?? fallback.shortLabel),
    dayLabel: String(raw?.dayLabel ?? raw?.day_label ?? fallback.dayLabel ?? ""),
    name: String(raw?.name || fallback.name),
    description: String(raw?.description || fallback.description),
    imageUrl: String(raw?.imageUrl ?? raw?.image_url ?? fallback.imageUrl ?? ""),
    tags,
    theme: String(raw?.theme || (isClosed ? "closed" : fallback.theme)),
    isClosed
  };
}
function normalizeFlavorsPayload(raw){
  const arr = Array.isArray(raw) ? raw : (Array.isArray(raw?.days) ? raw.days : []);
  if(!arr.length) return DEFAULT_WEEK_FLAVORS;

  return DEFAULT_WEEK_FLAVORS.map(fallback => {
    const found = arr.find(x => Number(x?.dayKey ?? x?.day_key) === fallback.dayKey) || arr.find(x => String(x?.id || "") === fallback.id);
    return normalizeFlavorDay(found || fallback, fallback);
  });
}

function getPromoTitle(id){
  const p = promotions.find(x=>x.id===id);
  return p ? p.title : id;
}

function formatTime(ts){
  return new Date(ts).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
}

function todayCount(data){
  const today = new Date().toDateString();
  return data.filter(x=>new Date(x.created_at).toDateString()===today).length;
}

function showToast(message, kind="info"){
  const el = document.getElementById("toast");
  if(!el) return;
  el.textContent = message;
  el.style.borderColor = (kind==="ok") ? "rgba(34,197,94,0.55)" : (kind==="bad") ? "rgba(239,68,68,0.55)" : "rgba(148,163,184,0.35)";
  el.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ el.classList.remove("show"); }, 1800);
}
function minutesAgo(ts){
  const ms = Date.now() - new Date(ts).getTime();
  return Math.max(0, Math.floor(ms/60000));
}

function isRewardPendingStatus(s){
  if(!s) return false;
  const v = String(s).toLowerCase();
  return v === "waiting" || v === "pending" || v === "requested";
}
function formatDateTime(ts){
  if(!ts) return "";
  return new Date(ts).toLocaleString("it-IT",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit"});
}

function dateKeyLocal(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function startOfTodayLocalISO(){
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0,0,0,0);
  return start.toISOString();
}
function startOfNDaysAgoLocalISO(daysAgo){
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0,0,0,0);
  start.setDate(start.getDate() - daysAgo);
  return start.toISOString();
}

async function startDashboard(){
  initKeyboardOnce();

  renderAll(true);

  try{
    await loadPromotions();
  }catch(e){
    console.error("loadPromotions startup error", e);
    lastError = e?.message || String(e);

async function loadRedemptions(){
  try{
    const {data, error} = await sb
      .from("redemptions")
      .select("*")
      .eq("status","waiting")
      .order("created_at",{ascending:true});

    if(error) throw error;

    online = true;
    lastError = "";

    const rows = data || [];

    // Auto-expire: waiting older than 5 minutes -> mark expired
    const now = Date.now();
    const toExpire = rows.filter(r => (now - new Date(r.created_at).getTime()) > 5*60*1000).map(r => r.id);
    if(toExpire.length){
      // avoid double-submission in the same tick
      const expireIds = toExpire.filter(id => !pendingPromoIds.has(id));
      if(expireIds.length){
        expireIds.forEach(id => pendingPromoIds.add(id));
        const { error: expErr } = await sb.from("redemptions").update({status:"expired"}).in("id", expireIds);
        expireIds.forEach(id => pendingPromoIds.delete(id));
        if(expErr){
          console.error(expErr);
          lastError = expErr.message || String(expErr);
        }else{
          // notify clients so they can close pending UI
          for(const rid of expireIds){ await sendRedemptionUpdate(rid, "expired"); }
        }
      }
    }

    // filter out those we just expired (they'll disappear next poll anyway)
    const visible = rows.filter(r => !toExpire.includes(r.id));
    promoRows = visible;
    const topId = promoRows && promoRows[0] ? promoRows[0].id : null;
    if(topId && topId !== lastTopPromoId){
      lastTopPromoId = topId;
      handleNewTop("promo");
    }
    if(!navMode && activeTab === "promo"){ armAutoSelect("promo"); }
    safeRenderAll();
  }catch(e){
    online = false;
    lastError = e?.message ? e.message : String(e);
    console.error(e);
    promoRows = [];
    safeRenderAll(); // still render header/status, but not management forms
  }
}


async function loadRewards(){
  try{
    const { data, error } = await sb
      .from("loyalty_reward_redemptions")
      .select("*")
      .order("created_at",{ascending:true})
      .limit(200);

    if(error) throw error;

    online = true;
    lastError = "";

    const rows = (data || []).filter(r => isRewardPendingStatus(r.status));

    const now = Date.now();
    const expired = rows.filter(r => r.expire_at && (new Date(r.expire_at).getTime() < now)).map(r => r.id);
    if(expired.length){
      const ids = expired.filter(id => !pendingRewardIds.has(id));
      if(ids.length){
        ids.forEach(id => pendingRewardIds.add(id));
        const { error: expErr } = await sb.from("loyalty_reward_redemptions")
          .update({status:"rejected"})
          .in("id", ids);
        ids.forEach(id => pendingRewardIds.delete(id));
        if(expErr){
          console.error(expErr);
          lastError = expErr.message || String(expErr);
        }else{
          // notify clients so they can close pending UI
          for(const rid of expireIds){ await sendRedemptionUpdate(rid, "expired"); }
        }
      }
    }

    rewardRows = rows.filter(r => !expired.includes(r.id));
    const topIdR = rewardRows && rewardRows[0] ? rewardRows[0].id : null;
    if(topIdR && topIdR !== lastTopRewardId){
      lastTopRewardId = topIdR;
      handleNewTop("rewards");
    }
    if(!navMode && activeTab === "rewards"){ armAutoSelect("rewards"); }
    safeRenderAll();
  }catch(e){
    online = false;
    lastError = e?.message ? e.message : String(e);
    console.error(e);
    rewardRows = [];
    safeRenderAll();
  }
}

async function approveReward(id, title=""){
  if(pendingRewardIds.has(id)) return;
  pendingRewardIds.add(id);
  renderAll();
  try{
    const { error } = await sb.from("loyalty_reward_redemptions")
      .update({status:"approved", approved_at: new Date().toISOString()})
      .eq("id", id);
    if(error) throw error;
    showToast("✅ Premio approvato: " + (title || id), "ok");
  }catch(e){
    console.error(e);
    showToast("❌ Errore approvazione premio", "bad");
  }finally{
    pendingRewardIds.delete(id);
    loadRewards();
  }
}

async function rejectReward(id, title=""){

  }

function setTab(tab){
  activeTab = tab;
  localStorage.setItem("kiosk_tab", tab);

  if(tab === "users"){
    loadUsers(true);
    return;
  }

  if(tab === "manageRewards"){
    loadManagedRewards().then(()=>renderAll(true));
    return;
  }

  if(tab === "managePromos"){
    loadPromotions().then(()=>renderAll(true));
    return;
  }

  if(tab === "manageNews"){
    loadManagedFlavors().then(()=>renderAll(true));
    return;
  }

  renderAll(true);
}

            : "Convalide in attesa";
  const showActivity = activeTab === "promo" || activeTab === "rewards" || activeTab === "users";
  document.getElementById("app").innerHTML = `<div class="header"><div class="title" style="text-align:center;">Kiosk</div><div class="small" style="text-align:center; margin-top:2px; opacity:0.85;">Gelateria L’Altromare</div><div style="height:10px;"></div><div class="title">${title}</div><div class="toprow"><div class="${statusBadgeClass}"><span class="${dotClass}"></span>${statusLabel}</div></div>${tabs}${kbdHint}${errText}</div>${main}${showActivity ? activityCard : ""}`;
  if(activeTab === "users") setTimeout(filterUserRowsInDom, 0);
}

async function approve(id, promoTitle=""){
  if(pendingPromoIds.has(id)) return;
  pendingPromoIds.add(id);
  renderAll(); // refresh UI to disable buttons immediately
  try{
    const { error } = await sb.from("redemptions")
      .update({status:"approved"})
      .eq("id",id)
      .eq("status","waiting");

    if(error) throw error;

    await sendRedemptionUpdate(id, "approved");
    showToast("✅ Convalidata: " + (promoTitle || id), "ok");
  }catch(e){
    console.error(e);
    showToast("❌ Errore convalida", "bad");
  }finally{
    pendingPromoIds.delete(id);
    renderAll();
  }
}

async function cancel(id, promoTitle=""){
  if(pendingPromoIds.has(id)) return;
  pendingPromoIds.add(id);
  renderAll();
  try{
    const { error } = await sb.from("redemptions")
      .update({status:"canceled"})
      .eq("id",id)
      .eq("status","waiting");

    if(error) throw error;

    await sendRedemptionUpdate(id, "canceled");
    showToast("❌ Annullata: " + (promoTitle || id), "bad");
  }catch(e){
    console.error(e);
    showToast("❌ Errore annulla", "bad");
  }finally{
    pendingPromoIds.delete(id);
    renderAll();
  }
}

function renderBootError(message){
  const app = document.getElementById("app");
  if(!app) return;
  app.innerHTML = `<div class="login"><h2>Kiosk non avviato</h2><div class="card" style="max-width:520px;text-align:center;"><div class="promo">Errore caricamento</div><div class="small">${escapeHtml(message || "Errore sconosciuto")}</div><button class="loginBtn" style="margin-top:14px;" onclick="location.reload()">Riprova</button></div></div>`;
}

if(!sb){
  renderBootError(window.__kioskBootError || "Supabase non inizializzato.");
}else{
  sb.auth.getSession().then(({data, error})=>{
    if(error){
      try{ localStorage.removeItem("gelatoclub_kiosk_auth_v1"); }catch(e){}
      sb.auth.signOut();
      renderLogin();
      return;
    }
    if(data.session){
      checkStaff();
    }else{
      renderLogin();
    }
  }).catch((e)=>{
    console.error(e);
    renderBootError(e?.message || String(e));
  });
}
</script>
